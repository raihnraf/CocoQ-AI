{% extends "base.html" %}
{% block title %}New Prediction — CocoQ-AI{% endblock %}

{% block content %}
<h1 class="mb-3">New Batch Prediction</h1>

<div class="card">
    <form id="prediction-form">
        <div class="grid grid-2">
            <div class="form-group">
                <label for="temperature">Temperature (°C)</label>
                <input type="number" step="0.1" id="temperature" name="temperature" required min="90" max="140" placeholder="90–140">
            </div>
            <div class="form-group">
                <label for="moisture">Moisture (%)</label>
                <input type="number" step="0.1" id="moisture" name="moisture" required min="0" max="10" placeholder="0–10">
            </div>
            <div class="form-group">
                <label for="ph">pH Level</label>
                <input type="number" step="0.1" id="ph" name="ph" required min="2" max="9" placeholder="2–9">
            </div>
            <div class="form-group">
                <label for="color_score">Color Score (0–100)</label>
                <input type="number" step="0.1" id="color_score" name="color_score" required min="0" max="100" placeholder="0–100">
            </div>
            <div class="form-group">
                <label for="cooking_time">Cooking Time (min)</label>
                <input type="number" step="1" id="cooking_time" name="cooking_time" required min="30" max="150" placeholder="30–150">
            </div>
            <div class="form-group">
                <label for="dryness_level">Dryness Level (1–5)</label>
                <input type="number" id="dryness_level" name="dryness_level" required min="1" max="5" placeholder="1–5">
            </div>
            <div class="form-group">
                <label for="supplier_origin">Supplier Origin</label>
                <select id="supplier_origin" name="supplier_origin" required>
                    <option value="">Select supplier</option>
                    <option value="Central Java">Central Java</option>
                    <option value="Central Kalimantan">Central Kalimantan</option>
                    <option value="East Java">East Java</option>
                    <option value="West Java">West Java</option>
                    <option value="Yogyakarta">Yogyakarta</option>
                </select>
            </div>
            <div class="form-group">
                <label for="visual_inspection">Visual Inspection</label>
                <select id="visual_inspection" name="visual_inspection" required>
                    <option value="">Select quality</option>
                    <option value="poor">Poor</option>
                    <option value="fair">Fair</option>
                    <option value="good">Good</option>
                    <option value="excellent">Excellent</option>
                </select>
            </div>
        </div>
        <button type="submit" class="btn mt-2" id="submit-btn">Get Prediction</button>
        <div id="form-error" class="mt-2" style="color: var(--danger); display: none;"></div>
    </form>
</div>

<div class="card mt-3" id="result-card" style="display:none;">
    <h3 class="mb-2">Prediction Result</h3>
    <div id="result-grade" class="stat-value"></div>
    <div class="mt-1">Confidence: <span id="result-confidence"></span>%</div>
    <div id="result-recommendation" class="mt-2 card" style="background: var(--bg);"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/predict.js') }}"></script>
{% endblock %}
