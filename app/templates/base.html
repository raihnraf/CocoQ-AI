<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CocoQ-AI{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('main.dashboard') }}" class="navbar-brand">CocoQ-AI</a>
        <div class="navbar-links">
            <a href="{{ url_for('main.dashboard') }}">Dashboard</a>
            <a href="{{ url_for('main.predict_page') }}">New Prediction</a>
            <a href="{{ url_for('main.history_page') }}">History</a>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <p>CocoQ-AI — Quality Prediction Demo</p>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
